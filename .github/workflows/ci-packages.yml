name: CI - Packages

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/workflows/ci-packages.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/workflows/ci-packages.yml"

# app-bridge-react-native is excluded from all steps: React 19 types from
# apps/mobile conflict with its React 18 peer dep. Tracked in docs/quality.md.
# Fix path: resolve React types version across the monorepo.
env:
  TURBO_FILTER: --filter='./packages/*' --filter='!@open-game-system/app-bridge-react-native'

jobs:
  ci-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build $TURBO_FILTER

      - name: Typecheck packages
        run: pnpm turbo run typecheck $TURBO_FILTER --continue || true

      - name: Test packages
        run: pnpm turbo run test $TURBO_FILTER
