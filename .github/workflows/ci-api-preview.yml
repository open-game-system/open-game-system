name: API Preview Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "services/api/**"
      - "packages/cast-kit-*/**"
      - ".github/workflows/ci-api-preview.yml"

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: api-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter=@open-game-system/api...

      - name: Run unit tests
        run: pnpm --filter @open-game-system/api test

      - name: Create per-PR D1 database (idempotent)
        id: d1
        run: |
          set -eo pipefail
          DB_NAME="opengame-api-pr-${PR_NUMBER}-db"

          # Try to get existing database
          set +e
          DB_INFO=$(npx wrangler d1 info "$DB_NAME" 2>&1)
          INFO_EXIT=$?
          set -e

          if [ $INFO_EXIT -eq 0 ]; then
            DB_ID=$(echo "$DB_INFO" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || true)
            if [ -n "$DB_ID" ]; then
              echo "Database ${DB_NAME} already exists: ${DB_ID}"
              echo "database_id=${DB_ID}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Create new database
          echo "Creating database ${DB_NAME}..."
          set +e
          CREATE_OUTPUT=$(npx wrangler d1 create "$DB_NAME" 2>&1)
          CREATE_EXIT=$?
          set -e
          echo "$CREATE_OUTPUT"

          DB_ID=$(echo "$CREATE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | tail -1 || true)

          if [ -z "$DB_ID" ]; then
            echo "Failed to extract database ID"
            exit 1
          fi

          echo "Created database: ${DB_ID}"
          echo "database_id=${DB_ID}" >> "$GITHUB_OUTPUT"

      - name: Render preview wrangler config
        env:
          PREVIEW_D1_DATABASE_ID: ${{ steps.d1.outputs.database_id }}
        run: node services/api/scripts/render-preview-wrangler.mjs

      - name: Apply schema to preview D1
        run: |
          npx wrangler d1 execute "opengame-api-pr-${PR_NUMBER}-db" \
            --file=services/api/schema.sql \
            --remote

      - name: Seed E2E test data
        run: |
          npx wrangler d1 execute "opengame-api-pr-${PR_NUMBER}-db" \
            --command="INSERT OR IGNORE INTO api_keys (key, game_id, game_name) VALUES ('e2e-test-api-key', 'e2e-test-game', 'E2E Test Game')" \
            --remote

      - name: Deploy preview Worker
        id: deploy
        working-directory: services/api
        run: |
          set -euo pipefail
          npx wrangler deploy --config .wrangler/preview-wrangler.jsonc > /tmp/wrangler-deploy.log 2>&1 || {
            cat /tmp/wrangler-deploy.log
            exit 1
          }
          cat /tmp/wrangler-deploy.log

          PREVIEW_URL=$(grep -Eo 'https://[A-Za-z0-9._/-]+workers.dev' /tmp/wrangler-deploy.log | tail -n1 || true)
          if [ -z "$PREVIEW_URL" ] && [ -n "${CLOUDFLARE_WORKERS_SUBDOMAIN:-}" ]; then
            PREVIEW_URL="https://opengame-api-pr-${PR_NUMBER}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev"
          fi
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      - name: Set preview Worker secrets
        working-directory: services/api
        env:
          WORKER_NAME: opengame-api-pr-${{ github.event.pull_request.number }}
        run: |
          printf '%s' "${{ secrets.CLOUDFLARE_REALTIME_APP_ID }}" | npx wrangler secret put CLOUDFLARE_REALTIME_APP_ID --config .wrangler/preview-wrangler.jsonc --name "$WORKER_NAME" || true
          printf '%s' "${{ secrets.CLOUDFLARE_REALTIME_APP_SECRET }}" | npx wrangler secret put CLOUDFLARE_REALTIME_APP_SECRET --config .wrangler/preview-wrangler.jsonc --name "$WORKER_NAME" || true

      - name: Comment on PR with preview URL
        if: steps.deploy.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### API Preview Deployed

            **URL:** ${process.env.PREVIEW_URL}

            **Worker:** \`opengame-api-pr-${process.env.PR_NUMBER}\`
            **D1 Database:** \`opengame-api-pr-${process.env.PR_NUMBER}-db\` (isolated per-PR)

            This preview will be automatically cleaned up when the PR is closed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('API Preview Deployed')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  e2e:
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: needs.deploy-preview.outputs.preview_url != ''
    env:
      E2E_API_PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview_url }}
      E2E_API_KEY: e2e-test-api-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm --dir services/api exec playwright install --with-deps chromium

      - name: Run E2E tests against preview
        working-directory: services/api
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-e2e-report
          path: |
            services/api/playwright-report
            services/api/test-results
