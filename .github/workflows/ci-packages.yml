name: CI - Packages

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/workflows/ci-packages.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/workflows/ci-packages.yml"

# app-bridge-react-native is excluded: React 19 types from apps/mobile conflict
# with its React 18 peer dep. Tracked in docs/quality.md.

jobs:
  ci-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter="./packages/*" --filter="!@open-game-system/app-bridge-react-native"

      - name: Typecheck packages
        run: pnpm turbo run typecheck --filter="./packages/*" --filter="!@open-game-system/app-bridge-react-native" --continue || true

      - name: Test packages
        run: pnpm turbo run test --filter="./packages/*" --filter="!@open-game-system/app-bridge-react-native"
