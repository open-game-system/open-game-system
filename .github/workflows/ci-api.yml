name: CI - API

on:
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/api/**"
      - ".github/workflows/ci-api.yml"

jobs:
  ci-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @open-game-system/api build

      - name: Typecheck API
        run: pnpm --filter @open-game-system/api typecheck

      - name: Test API
        run: pnpm --filter @open-game-system/api test
