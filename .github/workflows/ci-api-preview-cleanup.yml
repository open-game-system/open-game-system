name: API Preview Cleanup

on:
  pull_request:
    branches: [main]
    types: [closed]
    paths:
      - "services/api/**"
      - "packages/cast-kit-*/**"
      - ".github/workflows/ci-api-preview.yml"

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Delete preview Worker
        run: npx wrangler delete --name "opengame-api-pr-${PR_NUMBER}" --force || true

      - name: Delete preview D1 database
        run: |
          DB_NAME="opengame-api-pr-${PR_NUMBER}-db"
          npx wrangler d1 delete "$DB_NAME" --yes 2>/dev/null || echo "Database ${DB_NAME} not found or already deleted"
