name: Cloudflare Stream Preview Cleanup

on:
  pull_request:
    branches: [ main ]
    types: [closed]

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      STREAM_KIT_WORKER_NAME: stream-server-demo-pr-${{ github.event.pull_request.number }}
      STREAM_KIT_CONTAINER_NAME: stream-server-demo-pr-${{ github.event.pull_request.number }}
      STREAM_KIT_CONTAINER_SCRIPT_NAME: bun-stream-server
      STREAM_KIT_CONFIG_PATH: ${{ github.workspace }}/examples/stream-server-demo/.wrangler/preview-wrangler.json
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Render Wrangler config
        run: node examples/stream-server-demo/scripts/render-wrangler-config.mjs

      - name: Delete preview Worker and container
        run: node examples/stream-server-demo/scripts/cleanup-preview.mjs
