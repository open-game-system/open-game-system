<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OGS Cast Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #video-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #status-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      z-index: 10;
      transition: opacity 0.3s;
    }

    #status-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text {
      font-size: 18px;
      color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="stream-video" autoplay playsinline muted></video>
  </div>

  <div id="status-overlay">
    <div class="spinner" id="spinner"></div>
    <div class="status-text" id="status-text">Connecting to game stream...</div>
  </div>

  <!-- PeerJS for WebRTC signaling -->
  <script src="https://unpkg.com/peerjs@1.5.0/dist/peerjs.min.js"></script>

  <script>
    /**
     * OGS Cast Receiver
     *
     * Minimal receiver page for Chromecast/AirPlay.
     * Uses PeerJS for WebRTC signaling to receive a video stream
     * from a stream-kit container and display it full-screen.
     *
     * Launch params (URL query string):
     *   streamServerUrl — Base URL of the stream-kit server
     *   viewUrl         — URL to render on the stream server
     *   iceServers      — JSON-encoded array of ICE server configs (optional)
     *
     * Legacy params (for backward compatibility):
     *   streamUrl       — If provided, treated as streamServerUrl base
     */

    const CONNECTION_TIMEOUT_MS = 30000;

    // DOM elements
    const video = document.getElementById('stream-video');
    const overlay = document.getElementById('status-overlay');
    const statusText = document.getElementById('status-text');
    const spinner = document.getElementById('spinner');

    // State
    let peer = null;
    let currentCall = null;
    let connectionTimer = null;
    let isConnected = false;

    function getLaunchParams() {
      const params = new URLSearchParams(window.location.search);
      const streamServerUrl = params.get('streamServerUrl') || params.get('streamUrl') || '';
      const viewUrl = params.get('viewUrl') || '';
      const peerHost = params.get('peerHost') || '';
      const peerPort = params.get('peerPort') ? parseInt(params.get('peerPort'), 10) : 0;
      let iceServers = [{ urls: ['stun:stun.l.google.com:19302'] }];

      const iceParam = params.get('iceServers');
      if (iceParam) {
        try {
          iceServers = JSON.parse(iceParam);
        } catch (e) {
          console.warn('[Receiver] Failed to parse iceServers param:', e);
        }
      }

      return { streamServerUrl, viewUrl, iceServers, peerHost, peerPort };
    }

    function setStatus(text, showSpinner = true) {
      statusText.textContent = text;
      spinner.style.display = showSpinner ? 'block' : 'none';
      overlay.classList.remove('hidden');
    }

    function hideOverlay() {
      overlay.classList.add('hidden');
    }

    function startConnectionTimeout() {
      connectionTimer = setTimeout(() => {
        if (!isConnected) {
          setStatus('Connection timed out', false);
          cleanup();
        }
      }, CONNECTION_TIMEOUT_MS);
    }

    function clearConnectionTimeout() {
      if (connectionTimer) {
        clearTimeout(connectionTimer);
        connectionTimer = null;
      }
    }

    function cleanup() {
      clearConnectionTimeout();
      if (currentCall) {
        currentCall.close();
        currentCall = null;
      }
      if (peer) {
        peer.destroy();
        peer = null;
      }
    }

    async function startReceiving() {
      const { streamServerUrl, viewUrl, iceServers, peerHost, peerPort } = getLaunchParams();

      if (!streamServerUrl) {
        setStatus('Unable to connect to game stream', false);
        console.error('[Receiver] No streamServerUrl provided');
        return;
      }

      console.log('[Receiver] Stream server:', streamServerUrl);
      console.log('[Receiver] View URL:', viewUrl);
      console.log('[Receiver] ICE servers:', iceServers);

      setStatus('Connecting to game stream...');
      startConnectionTimeout();

      try {
        // Step 1: Fetch ICE servers from stream server (if available)
        let resolvedIceServers = iceServers;
        try {
          const iceEndpoint = `${streamServerUrl.replace(/\/$/, '')}/ice-servers`;
          const iceRes = await fetch(iceEndpoint);
          if (iceRes.ok) {
            const iceData = await iceRes.json();
            if (Array.isArray(iceData.iceServers)) {
              resolvedIceServers = iceData.iceServers;
              console.log('[Receiver] Got ICE servers from stream server:', resolvedIceServers);
            }
          }
        } catch (e) {
          console.log('[Receiver] Could not fetch ICE servers, using defaults');
        }

        // Step 2: Create PeerJS peer
        const receiverId = `receiver-${crypto.randomUUID()}`;
        console.log('[Receiver] Creating PeerJS peer:', receiverId);

        const peerOptions = {
          debug: 2,
          config: { iceServers: resolvedIceServers }
        };
        if (peerHost) {
          peerOptions.host = peerHost;
          peerOptions.port = peerPort || 9000;
          peerOptions.path = '/';
          peerOptions.secure = false;
        }
        peer = new Peer(receiverId, peerOptions);

        // Wait for peer to be ready
        await new Promise((resolve, reject) => {
          peer.on('open', (id) => {
            console.log('[Receiver] PeerJS connected with ID:', id);
            resolve(id);
          });
          peer.on('error', (err) => {
            console.error('[Receiver] PeerJS error:', err);
            reject(err);
          });
        });

        // Step 3: Listen for incoming calls BEFORE requesting stream
        peer.on('call', (call) => {
          console.log('[Receiver] Incoming call from:', call.peer);
          currentCall = call;

          // Answer the call (no local stream to send)
          call.answer();

          call.on('stream', (remoteStream) => {
            console.log('[Receiver] Received remote stream');
            clearConnectionTimeout();
            isConnected = true;

            video.srcObject = remoteStream;
            video.play().catch(e => console.warn('[Receiver] Video play failed:', e));
            hideOverlay();
          });

          call.on('close', () => {
            console.log('[Receiver] Call closed');
            isConnected = false;
            setStatus('Cast session ended', false);
          });

          call.on('error', (err) => {
            console.error('[Receiver] Call error:', err);
            setStatus('Stream error', false);
          });
        });

        // Step 4: Request stream from server
        setStatus('Starting stream...');
        const startEndpoint = `${streamServerUrl.replace(/\/$/, '')}/start-stream`;
        console.log('[Receiver] Requesting stream from:', startEndpoint);

        const streamRes = await fetch(startEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: viewUrl || 'about:blank',
            peerId: receiverId,
            iceServers: resolvedIceServers
          })
        });

        if (!streamRes.ok) {
          const errText = await streamRes.text().catch(() => 'unknown error');
          throw new Error(`Stream server returned ${streamRes.status}: ${errText}`);
        }

        const streamData = await streamRes.json();
        console.log('[Receiver] Stream started:', streamData);

        if (streamData.status !== 'success') {
          throw new Error(streamData.error || 'Stream server returned non-success status');
        }

        setStatus('Waiting for video stream...');

      } catch (err) {
        console.error('[Receiver] Failed to start stream:', err);
        clearConnectionTimeout();
        setStatus('Unable to connect to game stream', false);
      }
    }

    // Start receiving when page loads
    startReceiving();
  </script>
</body>
</html>
