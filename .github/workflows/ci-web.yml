name: CI - Web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/ci-web.yml"

jobs:
  ci-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @open-game-system/web build
