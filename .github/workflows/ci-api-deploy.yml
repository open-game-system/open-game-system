name: API Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - ".github/workflows/ci-api-deploy.yml"

concurrency:
  group: api-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter=@open-game-system/api...

      - name: Run tests
        run: pnpm --filter @open-game-system/api test

      - name: Apply schema migration
        run: |
          npx wrangler d1 execute "opengame-api-db" \
            --file=services/api/schema.sql \
            --remote

      - name: Deploy to production
        working-directory: services/api
        run: npx wrangler deploy
