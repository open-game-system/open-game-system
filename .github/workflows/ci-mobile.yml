name: CI - Mobile

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/ci-mobile.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/ci-mobile.yml"

jobs:
  ci-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm turbo run build --filter=@open-game-system/mobile^...

      - name: Typecheck mobile
        run: pnpm --filter @open-game-system/mobile typecheck

      - name: Test mobile
        run: pnpm --filter @open-game-system/mobile test:ci
