name: Cloudflare Stream Preview E2E

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

concurrency:
  group: cloudflare-stream-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
      worker_name: ${{ steps.names.outputs.worker_name }}
      container_name: ${{ steps.names.outputs.container_name }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}
      STREAM_KIT_TURN_API_TOKEN: ${{ secrets.CLOUDFLARE_TURN_API_TOKEN }}
      STREAM_KIT_TURN_KEY_ID: ${{ secrets.CLOUDFLARE_TURN_KEY_ID }}
      STREAM_KIT_DEBUG_STATE_TOKEN: ${{ secrets.DEBUG_STATE_TOKEN }}
      STREAM_KIT_PREVIEW_CONTAINER_IMAGE: registry.cloudchamber.cfdata.org/codeflare-containers:2aacba09
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Validate required Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "CLOUDFLARE_API_TOKEN is required" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "CLOUDFLARE_ACCOUNT_ID is required" && exit 1)
          test -n "$STREAM_KIT_TURN_API_TOKEN" || (echo "CLOUDFLARE_TURN_API_TOKEN is required" && exit 1)
          test -n "$STREAM_KIT_TURN_KEY_ID" || (echo "CLOUDFLARE_TURN_KEY_ID is required" && exit 1)

      - name: Compute preview names
        id: names
        run: |
          echo "worker_name=stream-server-demo-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "container_name=stream-server-demo-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Render Wrangler config
        env:
          STREAM_KIT_WORKER_NAME: ${{ steps.names.outputs.worker_name }}
          STREAM_KIT_CONTAINER_NAME: ${{ steps.names.outputs.container_name }}
          STREAM_KIT_CONTAINER_IMAGE: ${{ env.STREAM_KIT_PREVIEW_CONTAINER_IMAGE }}
          STREAM_KIT_CONFIG_PATH: ${{ github.workspace }}/examples/stream-server-demo/.wrangler/preview-wrangler.json
        run: node examples/stream-server-demo/scripts/render-wrangler-config.mjs

      - name: Clean stale preview resources
        env:
          STREAM_KIT_WORKER_NAME: ${{ steps.names.outputs.worker_name }}
          STREAM_KIT_CONTAINER_NAME: ${{ steps.names.outputs.container_name }}
          STREAM_KIT_CONFIG_PATH: ${{ github.workspace }}/examples/stream-server-demo/.wrangler/preview-wrangler.json
        run: node examples/stream-server-demo/scripts/cleanup-preview.mjs || true

      - name: Deploy preview Worker
        id: deploy
        working-directory: examples/stream-server-demo
        run: |
          set -euo pipefail
          if ! npx wrangler deploy --config .wrangler/preview-wrangler.json --name "${{ steps.names.outputs.worker_name }}" > /tmp/wrangler-deploy.log 2>&1; then
            cat /tmp/wrangler-deploy.log
            exit 1
          fi

          cat /tmp/wrangler-deploy.log

          preview_url=$(grep -Eo 'https://[A-Za-z0-9._/-]+workers.dev' /tmp/wrangler-deploy.log | tail -n1 || true)
          if [ -z "$preview_url" ] && [ -n "${CLOUDFLARE_WORKERS_SUBDOMAIN:-}" ]; then
            preview_url="https://${{ steps.names.outputs.worker_name }}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev"
          fi
          if [ -z "$preview_url" ]; then
            echo "Failed to parse preview URL from wrangler deploy output"
            exit 1
          fi
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Configure preview Worker secrets
        working-directory: examples/stream-server-demo
        env:
          WORKER_NAME: ${{ steps.names.outputs.worker_name }}
        run: |
          printf '%s' "$STREAM_KIT_TURN_API_TOKEN" | npx wrangler secret put CLOUDFLARE_TURN_API_TOKEN --config .wrangler/preview-wrangler.json --name "$WORKER_NAME"
          printf '%s' "$STREAM_KIT_TURN_KEY_ID" | npx wrangler secret put CLOUDFLARE_TURN_KEY_ID --config .wrangler/preview-wrangler.json --name "$WORKER_NAME"
          if [ -n "${STREAM_KIT_DEBUG_STATE_TOKEN:-}" ]; then
            printf '%s' "$STREAM_KIT_DEBUG_STATE_TOKEN" | npx wrangler secret put DEBUG_STATE_TOKEN --config .wrangler/preview-wrangler.json --name "$WORKER_NAME"
          fi

  e2e:
    runs-on: ubuntu-latest
    needs: deploy-preview
    env:
      E2E_STREAM_SERVER_URL: ${{ needs.deploy-preview.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --dir examples/stream-server-demo exec playwright install --with-deps chromium

      - name: Run deployed stream smoke
        run: pnpm --dir examples/stream-server-demo test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-stream-preview-artifacts
          path: |
            examples/stream-server-demo/playwright-report
            examples/stream-server-demo/test-results
