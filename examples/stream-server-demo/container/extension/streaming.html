<!-- Background command bridge -->
<script>
  try {
    chrome.runtime.onMessage.addListener((msg) => {
      if (msg && msg.type === 'START_CAPTURE') {
        console.log('[STREAMING.HTML] START_CAPTURE received');
        if (typeof INITIALIZE === 'function') {
          if (!window.__captureStarted) {
            window.__captureStarted = true;
            const params = window.__pendingPeers || { srcPeerId: crypto.randomUUID(), destPeerId: 'receiver-placeholder' };
            INITIALIZE(params);
          } else {
            console.log('[STREAMING.HTML] Capture already started, ignoring');
          }
        }
      }
    });
  } catch (e) {
    console.warn('[STREAMING.HTML] bridge error:', e?.message);
  }
</script>
